name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - run: pip install -r app/requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
  
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scar
          POSTGRES_PASSWORD: scar
          POSTGRES_DB: scar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      SCAR_DATABASE_URL: postgresql+psycopg://scar:scar@localhost:5432/scar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - run: pip install -r app/requirements.txt -r requirements-dev.txt
      - run: pytest tests/
  
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f app/Dockerfile -t scar:${{ github.sha }} .
      - name: Bring up the full stack
        run: docker compose up -d
      - name: Smoke test (health + write-path upload -> resolve round-trip)
        run: bash scripts/smoke-test.sh
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
  
  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production..."
      # TODO: push the Docker image to a registry and deploy to the production environment